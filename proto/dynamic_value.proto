syntax = "proto3";

package berserk;

// A dynamically-typed value that can represent any BQL scalar, array, or property bag.
// Used as the cell type in query result rows — each cell in a ValueRow is a BqlValue.
message BqlValue {
  oneof value {
    // Null (absent value). The bool payload is always true; the field's presence indicates null.
    bool null_value = 1;

    // 64-bit IEEE 754 floating-point number (BQL `real` type).
    double real_value = 2;

    // 64-bit signed integer (BQL `long` type).
    int64 long_value = 3;

    // 32-bit signed integer (BQL `int` type).
    int32 int_value = 4;

    // UTF-8 string (BQL `string` type). Also used for `guid` values.
    string string_value = 5;

    // Boolean (BQL `bool` type).
    bool bool_value = 6;

    // Duration in ticks — each tick is 100 nanoseconds (BQL `timespan` type).
    uint64 timespan_value = 7;

    // Timestamp in ticks since 0001-01-01T00:00:00Z — each tick is 100 nanoseconds (BQL `datetime` type).
    uint64 datetime_value = 10;

    // Nested key-value map (BQL `dynamic` property bag).
    PropertyBag bag_value = 8;

    // Ordered list of dynamic values (BQL `dynamic` array).
    Array array_value = 9;
  }
}

// An unordered map of string keys to dynamic values.
// Represents the property-bag variant of BQL's `dynamic` type.
message PropertyBag {
  map<string, BqlValue> properties = 1;
}

// An ordered list of dynamic values.
// Represents the array variant of BQL's `dynamic` type.
message Array {
  repeated BqlValue values = 1;
}
